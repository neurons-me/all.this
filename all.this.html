      const ME_RUNTIME_CANDIDATES = [

        "me/npm/dist/me.umd.js",
        "/me/npm/dist/me.umd.js",
        "/me/me.umd.js",

        react: "./packages/GUI/npm/node_modules/react/umd/react.production.min.js",

      let guiLayoutHandle = null;
      const pendingScripts = new Map();

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function resolveMeCtor() {
        const candidates = [
          window.Me,
          window.ME,
          globalThis.Me,
          globalThis.ME,
        ];

        for (const candidate of candidates) {
          if (typeof candidate === "function") return candidate;
          if (candidate && typeof candidate.ME === "function") return candidate.ME;
          if (candidate && typeof candidate.default === "function") return candidate.default;
          if (candidate && candidate.default && typeof candidate.default.ME === "function") {
            return candidate.default.ME;
          }
        }

        return null;
      }

      function resolveGuiRuntime() {
        const candidates = [
          window.GUI,
          window.ThisGUI,
          window.thisGUI,
          window["this.gui"],
          globalThis.GUI,
          globalThis.ThisGUI,
          globalThis.thisGUI,
          globalThis["this.gui"],
        ];

        for (const candidate of candidates) {
          if (!candidate || typeof candidate !== "object") continue;
          if (typeof candidate.mount === "function" || typeof candidate.startApp === "function") return candidate;
          if (candidate.default && typeof candidate.default === "object") {
            if (typeof candidate.default.mount === "function" || typeof candidate.default.startApp === "function") {
              return candidate.default;
            }
          }
        }

        return null;
      }

      function loadScriptOnce(src) {
        if (!src) return Promise.reject(new Error("Missing script src"));
        if (pendingScripts.has(src)) return pendingScripts.get(src);
        const existing = Array.from(document.querySelectorAll("script[src]")).find(
          (node) => node.src === new URL(src, document.baseURI).href,
        );
        if (existing && existing.getAttribute(SCRIPT_LOADED_ATTR) === "true") return Promise.resolve(true);

        const promise = new Promise((resolve, reject) => {
          const script = existing || document.createElement("script");
          if (!existing) {
            script.src = src;
            script.async = false;
            if (/^https?:/i.test(src)) script.crossOrigin = "anonymous";
          }
          script.onload = () => {
            script.setAttribute(SCRIPT_LOADED_ATTR, "true");
            resolve(true);
          };
          script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
          if (!existing) document.head.appendChild(script);
        }).finally(() => {
          pendingScripts.delete(src);
        });
        pendingScripts.set(src, promise);
        return promise;
      }

      function setGuiResolution(update) {
        guiResolution = { ...guiResolution, ...update };
        window.__ALL_THIS_GUI_RESOLUTION__ = guiResolution;
      }

      function monadGuiAssets(monad) {
        const endpoint = String(monad?.endpoint || "").replace(/\/+$/, "");
        if (!endpoint) return null;
        const manifest =
          monad?.raw?.gui ||
          monad?.raw?.GUI ||
          monad?.raw?.assets?.gui ||
          monad?.raw?.assets?.GUI ||
          monad?.raw?.runtime?.gui ||
          monad?.raw?.runtimes?.gui ||
          {};
        const assetUrl = (value, fallback) => {
          const asset = String(value || "").trim();
          if (!asset) return fallback;
          if (/^https?:\/\//i.test(asset)) return asset;
          if (asset.startsWith("/")) return `${endpoint}${asset}`;
          return `${endpoint}/${asset.replace(/^\.?\//, "")}`;
        };
        return {
          bootstrap: assetUrl(
            readString(manifest.bootstrap, manifest.bootstrapSrc, manifest.boot),
            `${endpoint}/gui/this.gui.bootstrap.umd.js`,
          ),
          css: assetUrl(readString(manifest.css, manifest.styles, manifest.style), `${endpoint}/gui/styles.css`),
          gui: assetUrl(readString(manifest.gui, manifest.runtime, manifest.umd), `${endpoint}/gui/this.gui.umd.js`),
          logo: assetUrl(readString(manifest.logo, manifest.brandLogo, manifest.image), `${endpoint}/gui/GUI.png`),
          react: assetUrl(readString(manifest.react), `${endpoint}/vendor/react/react.production.min.js`),
          reactDom: assetUrl(
            readString(manifest.reactDom, manifest.reactDOM),
            `${endpoint}/vendor/react-dom/react-dom.production.min.js`,
          ),
        };
      }

      function configuredGuiFallbackCandidates() {
        const configured = window.__ALL_THIS_GUI_FALLBACK_ASSETS__;
        if (!configured || typeof configured !== "object") return [];
        const assets = {
          bootstrap: configured.bootstrap,
          css: configured.css,
          gui: configured.gui,
          react: configured.react,
          reactDom: configured.reactDom,
        };
        if (!assets.bootstrap || !assets.gui) return [];
        return [{
          label: configured.label || "fallback GUI",
          source: configured.source || "fallback",
          detail: "configured fallback",
          assets,
        }];
      }

      function guiResolutionCandidates(monads = []) {
        const candidates = [
          {
            label: "local GUI",
            source: "local",
            detail: "local build",
            assets: LOCAL_GUI_ASSETS,
          },
        ];
        const preferred = recommendedMonad(monads);
        const orderedMonads = [
          ...(preferred ? [preferred] : []),
          ...monads.filter((monad) => monad.endpoint !== preferred?.endpoint),
        ];
        orderedMonads.forEach((monad) => {
          const assets = monadGuiAssets(monad);
          if (!assets) return;
          candidates.push({
            label: `${displayMeshMonadName(monad)} GUI`,
            source: "monad",
            detail: "served by monad",
            assets,
          });
        });
        candidates.push(...configuredGuiFallbackCandidates());

        const seen = new Set();
        return candidates.filter((candidate) => {
          const key = candidate.assets.bootstrap || candidate.assets.gui;
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      async function resolveGuiCandidate(candidate) {
        window.__THIS_GUI_DISABLE_AUTOBOOT__ = true;
        window.__THIS_GUI_BOOTSTRAP_ASSETS__ = {
          css: candidate.assets.css,
          gui: candidate.assets.gui,
          react: candidate.assets.react,
          reactDom: candidate.assets.reactDom,
        };
        await loadScriptOnce(candidate.assets.bootstrap);
        const bootstrap = typeof window.bootGUI === "function"
          ? window.bootGUI
          : typeof window.GUI?.bootstrap === "function"
            ? window.GUI.bootstrap
            : null;
        const GUI = bootstrap
          ? await bootstrap(window.__THIS_GUI_BOOTSTRAP_ASSETS__)
          : resolveGuiRuntime();

        if (!GUI || (typeof GUI.mount !== "function" && typeof GUI.startApp !== "function")) {
          throw new Error("GUI runtime missing after bootstrap");
        }

        window.__ALL_THIS_GUI__ = GUI;
        resolvedGUI = GUI;
        setGuiResolution({
          status: "resolved",
          label: candidate.label,
          source: candidate.source,
          detail: candidate.detail,
          logo: candidate.assets.logo,
          error: "",
        });
        return GUI;
      }

      async function ensureGuiRuntime(monads = []) {
        if (resolvedGUI) return resolvedGUI;
        if (!guiRuntimePromise) {
          guiRuntimePromise = (async () => {
            const candidates = guiResolutionCandidates(monads);
            let lastError = null;
            for (const candidate of candidates) {
              try {
                setGuiResolution({
                  status: "resolving",
                  label: candidate.label,
                  source: candidate.source,
                  detail: candidate.detail,
                  error: "",
                });
                return await resolveGuiCandidate(candidate);
              } catch (error) {
                lastError = error;
              }
            }
            setGuiResolution({
              status: "offline",
              label: "GUI",
              source: "unresolved",
              detail: "not resolved",
              error: lastError?.message || "GUI unavailable",
            });
            throw lastError || new Error("GUI unavailable");
          })().catch((error) => {
            guiRuntimePromise = null;
            throw error;
          });
        }
        return guiRuntimePromise;
      }

      async function ensureMeRuntime() {
        const existingCtor = resolveMeCtor();
        if (typeof existingCtor === "function") return existingCtor;
        if (!meRuntimePromise) {
          meRuntimePromise = (async () => {
            let lastError = null;
            for (const src of ME_RUNTIME_CANDIDATES) {
              try {
                await loadScriptOnce(src);
                const ctor = resolveMeCtor();
                if (typeof ctor === "function") return ctor;
                lastError = new Error(`.me runtime loaded but no constructor was exposed: ${src}`);
              } catch (error) {
                lastError = error;
              }
            }
            throw lastError || new Error("Failed to load .me runtime");
          })().catch((error) => {
            meRuntimePromise = null;
            throw error;
          });
        }
        return meRuntimePromise;
      }

      async function initLocalMe() {
        try {
          const MeCtor = await ensureMeRuntime();
          localMe = new MeCtor(ME_ROOT_SEED);
          localMe["@"](ME_ROOT_EXPRESSION);
          const inspected = typeof localMe.inspect === "function" ? localMe.inspect({ last: 8 }) : null;
          localMeBoot = {
            status: "initiated",
            seed: ME_ROOT_SEED,
            expression: ME_ROOT_EXPRESSION,
            memories: Array.isArray(inspected?.memories) ? inspected.memories.length : 1,
            error: "",
          };
        } catch (error) {
          localMeBoot = {
            ...localMeBoot,
            status: "error",
            error: error?.message || String(error),
          };
        }
        window.__ALL_THIS_ME__ = localMe;
        window.__ALL_THIS_ME_BOOT__ = localMeBoot;
        return localMeBoot;
      }

      function writeMePath(path, value) {
        if (!localMe || !path) return false;
        try {
          const parts = String(path).split(".").map((part) => part.trim()).filter(Boolean);
          const node = parts.reduce((scope, part) => scope?.[part], localMe);
          if (typeof node !== "function") return false;
          node(value);
          return true;
        } catch (_) {
          return false;
        }
      }

      function installGuiNamespace(GUI) {
        const records = [
          {
            path: "GUI",
            value: {
              type: "Namespace",
              name: "GUI",
              essence: "One object tree; props provide context.",
              source: guiResolution.source,
            },
          },
          {
            path: "GUI.Button",
            value: {
              type: "Button",
              family: "Atom",
              essence: "One button object, many contextual props.",
              props: ["label", "variant", "size", "href", "onClick"],
            },
          },
          {
            path: "GUI.Icon",
            value: {
              type: "Icon",
              family: "Atom",
              essence: "One registry adapter for Material, Lucide, and MUI icon tokens.",
              props: ["name", "iconColor", "fontSize", "fill", "weight"],
            },
          },
          {
            path: "GUI.Layout",
            value: {
              type: "Layout",
              family: "Shell",
              essence: "One layout object arranging semantic surfaces.",
              props: ["leftBar", "topBar", "rightBar", "footer", "children"],
            },
          },
          {
            path: "GUI.LeftBar",
            value: {
              type: "LeftBar",
              family: "Navigation",
              essence: "One left rail; elements change by namespace context.",
              props: ["initialView", "elements", "footerElements"],
            },
          },
        ];

        try {
          const paths = [];
          records.forEach((record) => {
            if (writeMePath(record.path, record.value)) paths.push(record.path);
          });
          guiNamespace = {
            status: paths.length === records.length ? "installed" : paths.length ? "partial" : "runtime-only",
            root: "GUI",
            paths,
            error: paths.length ? "" : ".me path writer unavailable",
          };
        } catch (error) {
          guiNamespace = {
            status: "error",
            root: "GUI",
            paths: [],
            error: error?.message || String(error),
          };
        }

        window.__ALL_THIS_GUI_NAMESPACE__ = {
          ...guiNamespace,
          runtime: Boolean(GUI),
          resolution: guiResolution,
        };
        return guiNamespace;
      }

      function guiLogoSrc() {
        return guiResolution.logo || LOCAL_GUI_ASSETS.logo;

      function buildGuiLeftBarLogo() {

      function guiNode(type, props = {}, children) {

      function guiPixelAvatar(seed) {
        const hash = hashString(seed);
        const colors = avatarColors(seed);
        const cells = [];
        for (let row = 0; row < 5; row += 1) {

            const mirrorCol = col > 2 ? 4 - col : col;
            const bitIndex = row * 3 + mirrorCol;
            const active = ((hash >> bitIndex) & 1) === 1 || (row === 2 && col === 2);
            const useSecondary = ((hash >> (bitIndex + 8)) & 1) === 1;
            cells.push(
              guiNode("Box", {
                component: "span",
                sx: {
                  borderRadius: "1px",
                  bgcolor: active ? (useSecondary ? colors.secondary : colors.primary) : "transparent",
                  opacity: active ? 1 : 0,

          "Box",

      function guiMonadBubble(monad, index, recommended) {
        const name = displayMeshMonadName(monad, index);
        const isRecommended = recommended?.endpoint === monad.endpoint;

      function mountGuiNamespaceLayout(monads = [], selected = null) {
        const GUI = resolvedGUI;
        if (!GUI || typeof GUI.mount !== "function") return false;
        installGuiNamespace(GUI);
        try {
          setBootStylesEnabled(false);
          guiLayoutHandle = GUI.mount(buildGuiNamespaceLayout(monads, selected), root, {
            gui: GUI,
            me: localMe,
            devtools: {
              inspector: false,
              adminView: false,
            },
          });
          window.__ALL_THIS_GUI_LAYOUT__ = {
            mounted: true,
            namespace: guiNamespace,
          };
          return true;
        } catch (error) {
          setBootStylesEnabled(true);
          window.__ALL_THIS_GUI_LAYOUT__ = {
            mounted: false,
            error: error?.message || String(error),
            namespace: guiNamespace,
          };
          pushLog(`[gui layout] ${error?.message || "mount failed"}`);
          return false;
        }
      }

      function unmountGuiNamespaceLayout() {
        if (!guiLayoutHandle || typeof guiLayoutHandle.unmount !== "function") return;
        try {
          guiLayoutHandle.unmount();
        } catch (_) {
        } finally {
          guiLayoutHandle = null;
        }
      }

            .boot-selector-form { grid-template-columns: minmax(0, 1fr) 38px; }
            .boot-select { grid-column: 1 / -1; }
            .boot-table { min-width: 540px; }
            .mesh-bubbles { grid-template-columns: repeat(auto-fit, minmax(112px, 1fr)); }
            .mesh-bubble { min-height: 154px; }
            .trust-line { grid-template-columns: 1fr; }
            .mesh-orb {
              width: 58px;
              height: 58px;
            }
          }
          @media (max-width: 340px) {
            .boot-shell { padding: 8px; }
            .boot-panel {
              margin-top: 10px;
              border-radius: 6px;
            }
            .boot-actions { gap: 6px; }
            .boot-button {
              min-height: 34px;
              padding: 7px 9px;
            }
          }
        `;
        document.head.appendChild(style);
      }

      function setBootStep(step, detail = "") {
        bootStep = detail ? `${step}: ${detail}` : step;
      }

      function pushLog(line) {
        const text = String(line ?? "").trim();
        if (!text) return;
        bootLog.push(text);
        if (bootLog.length > 16) bootLog = bootLog.slice(-16);
      }

      function normalizeTargetSpec(value) {
        return String(value || "").trim().replace(/\/+$/, "");
      }

      function readJsonStorage(key, fallback) {
        try {
          const raw = window.localStorage?.getItem(key);
          if (!raw) return fallback;
          return JSON.parse(raw);
        } catch (_) {
          return fallback;
        }
      }

      function writeJsonStorage(key, value) {
        try {
          window.localStorage?.setItem(key, JSON.stringify(value));
        } catch (_) {}
      }

      function readStoredTargetSpecs() {
        try {
          const raw = window.localStorage?.getItem(TARGETS_STORAGE_KEY);
          if (raw == null) return null;
          const stored = JSON.parse(raw);
          return Array.isArray(stored) ? stored.map(normalizeTargetSpec).filter(Boolean) : null;
        } catch (_) {
          return null;
        }
      }

      function readTargetSpecs() {
        const params = new URLSearchParams(window.location.search);
        const fromQuery = [
          params.get("endpoint"),
          params.get("ports"),
          params.get("monad"),
        ].map(normalizeTargetSpec).filter(Boolean);
        const storedList = readStoredTargetSpecs();
        const list = [
          ...fromQuery,
          ...(storedList === null ? DEFAULT_TARGET_SPECS : storedList),
        ].map(normalizeTargetSpec).filter(Boolean);
        return Array.from(new Set(list));
      }

      function saveTargetSpecs() {
        writeJsonStorage(TARGETS_STORAGE_KEY, targetSpecs);
      }

      function renderShell({
        title,
        caption = "",
        phase = "",
        phaseCaption = "",
        progress = 10,
        state = "normal",
        body = "",
        showPhase = true,
        showLog = true,
      }) {
        ensureStyles();
        setBootStylesEnabled(true);
        const phaseMarkup = showPhase
          ? `
              <div class="boot-progress"><span style="width:${Math.max(8, Math.min(100, progress))}%"></span></div>
              <div class="boot-phase"><strong>${escapeHtml(phase)}</strong> :: ${escapeHtml(bootStep)}</div>
              <div class="boot-phase-copy">${escapeHtml(phaseCaption)}</div>
            `
          : "";
        const captionMarkup = caption ? `<div class="boot-copy">${escapeHtml(caption)}</div>` : "";
        const logMarkup = showLog ? `<pre class="boot-log">${escapeHtml(bootLog.join("\n"))}</pre>` : "";
        root.innerHTML = `
          <section class="boot-shell ${state === "stalled" ? "is-stalled" : ""} ${state === "error" ? "is-error" : ""}">
            <div class="boot-wrap">
              <div class="boot-head">${escapeHtml(ENTRY_LABEL)}</div>
              <div class="boot-title">${escapeHtml(title)}</div>
              ${captionMarkup}
              ${phaseMarkup}
              ${body}
              ${logMarkup}
            </div>
          </section>
        `;
      }

      function setBootStylesEnabled(enabled) {
        const style = document.getElementById("all-this-entry-styles");
        if (!enabled) {
          if (style) style.remove();
          return;
        }
        if (style) {
          style.disabled = false;
          return;
        }
        ensureStyles();
      }

      function parsePortSpec(spec) {
        const ports = new Set();
        String(spec || "")
          .split(",")
          .map((part) => part.trim())
          .filter(Boolean)
          .forEach((part) => {
            const range = part.match(/^(\d+)-(\d+)$/);
            if (range) {
              const start = Number(range[1]);
              const end = Number(range[2]);
              for (let port = start; port <= end; port += 1) ports.add(port);
              return;
            }
            const port = Number(part);
            if (Number.isInteger(port) && port > 0) ports.add(port);
          });
        return Array.from(ports).sort((a, b) => a - b);
      }

      function targetType(spec) {
        if (/^https?:\/\//i.test(spec)) return "endpoint";
        if (parsePortSpec(spec).length > 0) return "ports";
        return "name";
      }

      function displayTargetType(type) {
        if (type === "endpoint") return "url";
        if (type === "ports") return "port/range";
        return type || "-";
      }

      function titleCaseWords(value) {
        return String(value || "")
          .replace(/[-_.]+/g, " ")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/\b([a-z])/gi, (letter) => letter.toUpperCase());
      }

      function displayMonadName(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";
        const withoutPrefix = raw.replace(/^monad[-_]?/i, "");
        return titleCaseWords(withoutPrefix || raw);
      }

      function displayMeshMonadName(monad, index = 0) {
        const label = displayMonadName(monad?.name);
        if (!label || /^\d+$/.test(label)) return index > 0 ? `Local Monad ${index + 1}` : "Local Monad";
        return label;
      }

      function displayMonadState(monad) {
        if (monad?.cleakerVerified) return "cleaked";
        if (monad?.id && monad?.cleaker) return "cleaker";
        return monad?.status || "online";
      }

      function displayTargetSpec(spec) {
        const type = targetType(spec);
        return type === "name" ? displayMonadName(spec) : spec;
      }

      function selectorExpansion(spec) {
        const type = targetType(spec);
        if (type === "endpoint") return "direct URL";
        if (type === "ports") {
          const ports = parsePortSpec(spec);
          if (!ports.length) return "no ports";
          const range = ports.length === 1 ? String(ports[0]) : `${ports[0]}-${ports[ports.length - 1]}`;
          return `${range} on 127.0.0.1 + localhost`;
        }
        if (normalizeTargetSpec(spec).toLowerCase() === LOCAL_MONAD_SELECTOR) return "local Monad entries";
        return `name aliases on ${LOCAL_MONAD_PORT}`;
      }

      function splitTargetInput(value) {
        const normalized = normalizeTargetSpec(value);
        if (!normalized) return [];
        const parts = normalized.split(",").map(normalizeTargetSpec).filter(Boolean);
        if (parts.length <= 1) return [normalized];
        const allPortSpecs = parts.every((part) => targetType(part) === "ports");
        return allPortSpecs ? [normalized] : parts;
      }

      function targetInputPlaceholder(type) {
        if (type === "ports") return DEFAULT_PORTS;
        if (type === "endpoint") return `http://127.0.0.1:${LOCAL_MONAD_PORT}`;
        return LOCAL_MONAD_SELECTOR;
      }

      function typedTargetValues(type, value) {
        const normalized = normalizeTargetSpec(value);
        if (!normalized) return [];
        if (type === "ports") return [normalized];
        if (type === "endpoint") return [/^https?:\/\//i.test(normalized) ? normalized : `http://${normalized}`];
        return splitTargetInput(normalized);
      }

      function normalizeHostCandidate(value) {
        return String(value || "")
          .trim()
          .replace(/^https?:\/\//i, "")
          .replace(/\/.*$/, "")
          .replace(/:+$/, "");
      }

      function expandTargetSpec(spec) {
        const selector = normalizeTargetSpec(spec);
        if (!selector) return [];
        const type = targetType(selector);
        const attempts = [];

        if (type === "endpoint") {
          attempts.push({ selector, type, endpoint: selector });
          return attempts;
        }

        if (type === "ports") {
          parsePortSpec(selector).forEach((port) => {
            attempts.push({ selector, type, endpoint: `http://127.0.0.1:${port}` });
            attempts.push({ selector, type, endpoint: `http://localhost:${port}` });
          });
          return attempts;
        }

        if (selector.toLowerCase() === LOCAL_MONAD_SELECTOR) {
          [
            "http://local.monad",
            `http://local.monad:${LOCAL_MONAD_PORT}`,
            `http://monad.local:${LOCAL_MONAD_PORT}`,
            ...parsePortSpec(DEFAULT_PORTS).flatMap((port) => [
              `http://127.0.0.1:${port}`,
              `http://localhost:${port}`,
            ]),
          ].forEach((endpoint) => attempts.push({ selector, type, endpoint }));
          return attempts;
        }

        const host = normalizeHostCandidate(selector);
        if (!host) return [];
        const aliases = new Set([host.toLowerCase()]);
        if (!/^monad[-_]?/i.test(host)) {
          aliases.add(`monad${host}`.toLowerCase());
          aliases.add(`monad-${host}`.toLowerCase());
        }
        const hostCandidates = Array.from(aliases).flatMap((alias) =>
          alias.includes(".") ? [alias] : [`${alias}.local`, alias],
        );
        hostCandidates.forEach((hostCandidate) => {
          attempts.push({ selector, type, endpoint: `http://${hostCandidate}:${LOCAL_MONAD_PORT}` });
        });
        return attempts;
      }

      function candidateAttempts() {
        const attempts = [];
        const seen = new Set();
        if (/^https?:$/.test(window.location.protocol)) {
          attempts.push({
            selector: "current-origin",
            type: "endpoint",
            endpoint: window.location.origin.replace(/\/+$/, ""),
          });
        }
        targetSpecs.forEach((spec) => attempts.push(...expandTargetSpec(spec)));
        return attempts.filter((attempt) => {
          const key = `${attempt.selector}|${attempt.endpoint}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function withTimeout(ms) {
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), ms);
        return { controller, timeout };
      }

      function readString(...values) {
        for (const value of values) {
          if (typeof value === "string" && value.trim()) return value.trim();
        }
        return "";
      }

      function readList(...values) {
        for (const value of values) {
          if (Array.isArray(value)) return value.map(String).map((item) => item.trim()).filter(Boolean);
          if (typeof value === "string" && value.trim()) {
            return value.split(",").map((item) => item.trim()).filter(Boolean);
          }
          if (value && typeof value === "object") {
            const keys = Object.keys(value).filter((key) => Boolean(value[key]));
            if (keys.length) return keys;
          }
        }
        return [];
      }

      function arrayBufferToHex(buffer) {
        return Array.from(new Uint8Array(buffer))
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      }

      function base64ToArrayBuffer(value) {
        const binary = window.atob(String(value || ""));
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes.buffer;
      }

      function base64UrlToArrayBuffer(value) {
        const normalized = String(value || "").replace(/-/g, "+").replace(/_/g, "/");
        return base64ToArrayBuffer(normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "="));
      }

      function pemToArrayBuffer(value) {
        return base64ToArrayBuffer(
          String(value || "")
            .replace(/-----BEGIN PUBLIC KEY-----/g, "")
            .replace(/-----END PUBLIC KEY-----/g, "")
            .replace(/\s+/g, ""),
        );
      }

      async function sha256Hex(value) {
        if (!window.crypto?.subtle) return "";
        const digest = await window.crypto.subtle.digest("SHA-256", new TextEncoder().encode(String(value || "")));
        return arrayBufferToHex(digest);
      }

      async function verifyEd25519Proof(publicKey, message, signature) {
        if (!window.crypto?.subtle || !publicKey || !message || !signature) return false;
        try {
          const key = await window.crypto.subtle.importKey(
            "spki",
            pemToArrayBuffer(publicKey),
            { name: "Ed25519" },
            false,
            ["verify"],
          );
          return await window.crypto.subtle.verify(
            { name: "Ed25519" },
            key,
            base64UrlToArrayBuffer(signature),
            new TextEncoder().encode(message),
          );
        } catch (_) {
          return false;
        }
      }

      async function annotateCleaker(monad) {
        if (!monad?.id || !monad?.publicKey) return monad;
        const hash = await sha256Hex(monad.publicKey);
        const idMatches = hash ? `monad:${hash}` === monad.id : false;
        const signature = monad.cleaker?.signature || {};
        const signatureVerified = await verifyEd25519Proof(monad.publicKey, signature.message, signature.value);
        return {
          ...monad,
          cleakerVerified: idMatches && signatureVerified,
          cleakerIdMatches: idMatches,
        };
      }

      function endpointFromSurface(surface, fallback) {
        const advertised = readString(
          surface?.endpoint,
          surface?.url,
          surface?.origin,
          surface?.apiOrigin,
          surface?.surfaceEntry?.endpoint,
          surface?.self?.endpoint,
          surface?.monad?.endpoint,
        );
        if (/^https?:\/\//i.test(advertised)) return advertised.replace(/\/+$/, "");
        return fallback.replace(/\/+$/, "");
      }

      function normalizeSurface(surface, fallbackEndpoint) {
        const endpoint = endpointFromSurface(surface, fallbackEndpoint);
        const port = (() => {
          try {
            return new URL(endpoint).port || "";
          } catch (_) {
            return "";
          }
        })();
        const cleaker =
          surface?.cleaker ||
          surface?.monad?.cleaker ||
          surface?.surfaceEntry?.cleaker ||
          surface?.surfaceEntry?.monad?.cleaker ||
          null;
        const publicKey = readString(
          surface?.publicKey,
          surface?.monad?.publicKey,
          surface?.monad?.publicKey?.key,
          surface?.surfaceEntry?.publicKey,
          surface?.surfaceEntry?.monad?.publicKey,
          surface?.surfaceEntry?.cleaker?.publicKey?.key,
          cleaker?.publicKey?.key,
          cleaker?.publicKey,
        );
        const id = readString(
          surface?.id,
          surface?.monadId,
          surface?.monad?.id,
          surface?.surfaceEntry?.monadId,
          surface?.surfaceEntry?.monad?.id,
          surface?.surfaceEntry?.cleaker?.id,
          cleaker?.id,
        );

        return {
          raw: surface,
          id,
          publicKey,
          cleaker,
          endpoint,
          port,
          name: readString(
            surface?.name,
            surface?.monadName,
            surface?.surfaceEntry?.monadName,
            surface?.surfaceEntry?.name,
            surface?.monad?.name,
            surface?.self?.name,
            surface?.identity?.name,
            port ? `monad-${port}` : "monad",
          ),
          namespace: readString(
            surface?.namespace,
            surface?.target?.namespace?.me,
            surface?.surfaceEntry?.identity,
            surface?.root,
            surface?.rootNamespace,
            surface?.host,
            surface?.self?.namespace,
            surface?.monad?.namespace,
          ),
          status: readString(surface?.status, surface?.self?.status, "online"),
        };
      }

      function normalizeCost(value) {
        const text = String(value || "").trim().toLowerCase();
        if (!text) return "";
        if (/^(low|bajo|cheap|local|very low|muy bajo)$/.test(text)) return "low";
        if (/^(medium|medio|normal)$/.test(text)) return "medium";
        if (/^(high|alto|expensive|cloud)$/.test(text)) return "high";
        return text;
      }

      function costRank(value) {
        const cost = normalizeCost(value);
        if (cost === "low") return 1;
        if (cost === "medium") return 2;
        if (cost === "high") return 3;
        return 2;
      }

      function inferCost(monad) {
        const declared = normalizeCost(
          readString(
            monad?.raw?.cost,
            monad?.raw?.operationalCost,
            monad?.raw?.budget?.cost,
            monad?.raw?.monad?.cost,
            monad?.raw?.self?.cost,
          ),
        );
        if (declared) return declared;
        const endpoint = monad?.endpoint || "";
        if (/\/\/(127\.0\.0\.1|localhost)(:|\/|$)/i.test(endpoint)) return "low";
        if (Number(monad?.elapsed) > 150) return "high";
        if (Number(monad?.elapsed) > 40) return "medium";
        return "low";
      }

      function capabilitiesOf(surface) {
        return readList(
          surface?.capabilities,
          surface?.capability,
          surface?.surfaceEntry?.capabilities,
          surface?.surfaceEntry?.resources,
          surface?.surfaceEntry?.tags,
          surface?.monad?.capabilities,
          surface?.self?.capabilities,
          surface?.identity?.capabilities,
        );
      }

      function formatLatency(ms) {
        const value = Number(ms);
        if (!Number.isFinite(value)) return "-";
        if (value >= 1000) return `${(value / 1000).toFixed(1)}s`;
        return `${Math.round(value)}ms`;
      }

      function routeScore(monad) {
        const latency = Number.isFinite(Number(monad?.elapsed)) ? Number(monad.elapsed) : 999;
        const statusPenalty = String(monad?.status || "").toLowerCase() === "online" ? 0 : 500;
        return costRank(monad?.cost) * 1000 + statusPenalty + latency;
      }

      function recommendedMonad(monads) {
        return [...monads].sort((a, b) => routeScore(a) - routeScore(b))[0] || null;
      }

      function namespaceLabel(monads) {
        const namespace = monads.map((monad) => monad.namespace).find(Boolean) || "";
        if (!namespace || /^(https?:\/\/)?(127\.0\.0\.1|localhost)(:\d+)?$/i.test(namespace)) return "local mesh";
        return namespace;
      }

      function meshPathLabel(namespace) {
        const root = String(namespace || "").replace(/\/+$/, "") || "local mesh";
        return `${root}/monads.mesh`;
      }

      function endpointRouteKey(endpoint) {
        try {
          const url = new URL(endpoint);
          const host = url.hostname.toLowerCase();
          if ((host === "127.0.0.1" || host === "localhost") && url.port) return `local:${url.port}`;
          return `${host}:${url.port || url.protocol}`;
        } catch (_) {
          return String(endpoint || "");
        }
      }

      function monadRouteKey(monad) {
        if (monad?.id) return monad.id;
        const identity = String(monad?.raw?.surfaceEntry?.identity || monad?.raw?.identity || "").trim();
        const name = String(monad?.raw?.surfaceEntry?.monadName || monad?.name || "").trim();
        const endpoint = endpointRouteKey(monad?.endpoint || "");
        return identity && name ? `${identity}:${name}:${endpoint}` : endpoint;
      }

      function hashString(value) {
        let hash = 2166136261;
        const text = String(value || "");
        for (let index = 0; index < text.length; index += 1) {
          hash ^= text.charCodeAt(index);
          hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
      }

      function avatarColors(seed) {
        const hash = hashString(seed);
        const hue = hash % 360;
        return {
          primary: `hsl(${hue} 28% 72%)`,
          secondary: `hsl(${(hue + 42) % 360} 22% 56%)`,
        };
      }

      function renderPixelAvatar(seed) {
        const hash = hashString(seed);
        const colors = avatarColors(seed);
        const cells = [];
        for (let row = 0; row < 5; row += 1) {
          for (let col = 0; col < 5; col += 1) {
            const mirrorCol = col > 2 ? 4 - col : col;
            const bitIndex = row * 3 + mirrorCol;
            const active = ((hash >> bitIndex) & 1) === 1 || (row === 2 && col === 2);
            const useSecondary = ((hash >> (bitIndex + 8)) & 1) === 1;
            cells.push(
              `<span class="mesh-pixel" style="--pixel-color:${active ? (useSecondary ? colors.secondary : colors.primary) : "transparent"};--pixel-opacity:${active ? "1" : "0"}"></span>`,
            );
          }
        }
        return `<span class="mesh-avatar" aria-hidden="true">${cells.join("")}</span>`;
      }

      async function probeEndpoint(attempt) {
        const endpoint = attempt.endpoint;
        const { controller, timeout } = withTimeout(DISCOVERY_TIMEOUT_MS);
        const startedAt = Date.now();
        try {
          const response = await fetch(`${endpoint}/__surface`, {
            cache: "no-store",
            signal: controller.signal,
          });
          const elapsed = Date.now() - startedAt;
          if (!response.ok) {
            return { ...attempt, endpoint, elapsed, status: `HTTP ${response.status}`, monad: null };
          }
          const surface = await response.json();
          const normalized = normalizeSurface(surface, endpoint);
          const monad = await annotateCleaker({
            ...normalized,
            elapsed,
            selector: attempt.selector,
            type: attempt.type,
            capabilities: capabilitiesOf(surface),
          });
          monad.cost = inferCost(monad);
          return { ...attempt, endpoint, elapsed, status: "online", monad };
        } catch (error) {
          return {
            ...attempt,
            endpoint,
            elapsed: Date.now() - startedAt,
            status: error?.name === "AbortError" ? "timeout" : "no answer",
            monad: null,
          };
        } finally {
          window.clearTimeout(timeout);
        }
      }

      async function discoverMonads() {
        const attempts = candidateAttempts();
        setBootStep("scan", `${attempts.length} candidates`);
        lastScanAttempts = attempts.map((attempt) => ({ ...attempt, status: "scanning", monad: null }));
        renderShell({
          title: "scanning monads",
          phase: "Entry Discovery",
          phaseCaption: "Trying configured Monad entries.",
          progress: 25,
          body: `
            ${renderLocalMePanel()}
            ${renderGuiResolutionPanel()}
            <div class="boot-panel">
              <div class="boot-panel-head">
                <div>
                  <strong>Selectors: Add, remove, or scan monads.</strong>
                </div>
              </div>
              ${renderSelectorsTable()}
            </div>
            ${renderScanPanel()}
          `,
        });

        const results = await Promise.all(attempts.map((attempt) => probeEndpoint(attempt)));
        lastScanAttempts = results;
        const seen = new Set();
        return results
          .map((attempt) => attempt.monad)
          .filter(Boolean)
          .filter((monad) => {
            const key = monadRouteKey(monad);
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });
      }

      function filteredScanAttempts() {
        return lastScanAttempts.filter((attempt) => {
          if (scanViewFilter === "all") return true;
          if (scanViewFilter === "online") return Boolean(attempt.monad);
          if (scanViewFilter === "offline") return !attempt.monad;
          if (scanViewFilter === "names") return attempt.type === "name";
          if (scanViewFilter === "ports") return attempt.type === "ports";
          if (scanViewFilter === "endpoints") return attempt.type === "endpoint";
          return true;
        });
      }

      function renderFilterButtons() {
        const filters = [
          ["all", "All"],
          ["online", "Online"],
          ["offline", "No answer"],
          ["names", "Names"],
          ["ports", "Ports"],
          ["endpoints", "URLs"],
        ];
        return filters
          .map(([key, label]) =>
            `<button class="boot-button" type="button" data-filter="${escapeHtml(key)}" aria-pressed="${scanViewFilter === key ? "true" : "false"}">${escapeHtml(label)}</button>`,
          )
          .join("");
      }

      function renderSelectorsTable() {
        if (!targetSpecs.length) {
          return `
            <div class="boot-empty">
              <strong>No selectors configured.</strong>
              <span>Choose a type, then add a selector.</span>
            </div>
          `;
        }
        const rows = targetSpecs
          .map((spec, index) => {
            const type = targetType(spec);
            return `
              <tr>
                <td>${escapeHtml(displayTargetSpec(spec))}</td>
                <td>${escapeHtml(displayTargetType(type))}</td>
                <td>${escapeHtml(selectorExpansion(spec))}</td>
                <td><button class="boot-button danger" type="button" data-remove-index="${escapeHtml(index)}">Remove</button></td>
              </tr>
            `;
          })
          .join("");
        return `
          <table class="boot-table">
            <thead>
              <tr>
                <th>Selector</th>
                <th>Type</th>
                <th>Scan</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      }

      function renderScanTable() {
        const attempts = filteredScanAttempts();
        if (!attempts.length) {
          return `
            <div class="boot-empty">
              <strong>${lastScanAttempts.length ? "No rows match this filter." : "Nothing scanned yet."}</strong>
              <span>${targetSpecs.length ? "Change the filter or scan again." : "Add a selector to choose where to scan."}</span>
            </div>
          `;
        }
        const rows = attempts
          .map((attempt) => {
            const monad = attempt.monad;
            return `
              <tr>
                <td>${escapeHtml(displayTargetSpec(attempt.selector || "-"))}<br /><span class="muted">${escapeHtml(displayTargetType(attempt.type))}</span></td>
                <td>${escapeHtml(attempt.endpoint)}</td>
                <td>${escapeHtml(attempt.status || "no answer")}${attempt.elapsed ? `<br /><span class="muted">${escapeHtml(attempt.elapsed)}ms</span>` : ""}</td>
                <td>${escapeHtml(displayMonadName(monad?.name) || "-")}<br /><span class="muted">${escapeHtml(monad?.namespace || "")}</span></td>
                <td>${monad ? `<a class="boot-button primary" href="${escapeHtml(monad.endpoint)}/">Open</a>` : ""}</td>
              </tr>
            `;
          })
          .join("");
        return `
          <table class="boot-table">
            <thead>
              <tr>
                <th>Selector</th>
                <th>Endpoint</th>
                <th>Status</th>
                <th>Monad</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      }

      function renderSelectorComposer() {
        return `
          <div class="boot-panel">
            <div class="boot-panel-head">
              <div>
                <strong>Selectors: Add, remove, or scan monads.</strong>
              </div>
              <div class="boot-actions">
                <button class="boot-button" id="reset-targets-button" type="button">Default discovery</button>
                <button class="boot-button primary" type="button" data-rescan-button>Rescan</button>
              </div>
            </div>
            ${renderSelectorsTable()}
          </div>
          <div class="boot-selector-form">
            <select class="boot-select" id="target-type" aria-label="Selector type">
              <option value="name">name</option>
              <option value="ports">port/range</option>
              <option value="endpoint">url</option>
            </select>
            <input class="boot-input" id="target-input" placeholder="local.monad" aria-label="Monad selector" />
            <button class="boot-button primary" id="add-target-button" type="button" aria-label="Add selector">+</button>
          </div>
        `;
      }

      function renderScanPanel() {
        return `
          <div class="boot-panel">
            <div class="boot-panel-head">
              <div>
                <strong>Scan results</strong>
                <span>Filter the latest discovery output.</span>
              </div>
            </div>
            <div class="boot-actions">${renderFilterButtons()}</div>
            <div class="boot-scan-list">${renderScanTable()}</div>
          </div>
        `;
      }

      function bindDiscoveryControls(renderAgain) {
        const targetInput = document.getElementById("target-input");
        const targetTypeInput = document.getElementById("target-type");
        const syncTargetPlaceholder = () => {
          if (!targetInput || !targetTypeInput) return;
          targetInput.placeholder = targetInputPlaceholder(targetTypeInput.value);
        };
        const addTarget = () => {
          const values = typedTargetValues(targetTypeInput?.value || "name", targetInput?.value || "");
          if (!values.length) return;
          targetSpecs = Array.from(new Set([...targetSpecs, ...values]));
          saveTargetSpecs();
          if (targetInput) targetInput.value = "";
          renderAgain();
        };

        syncTargetPlaceholder();
        targetTypeInput?.addEventListener("change", syncTargetPlaceholder);
        document.getElementById("add-target-button")?.addEventListener("click", addTarget);
        document.getElementById("reset-targets-button")?.addEventListener("click", () => {
          targetSpecs = [...DEFAULT_TARGET_SPECS];
          scanViewFilter = "all";
          saveTargetSpecs();
          boot();
        });
        document.querySelectorAll("[data-remove-index]").forEach((button) => {
          button.addEventListener("click", () => {
            const index = Number(button.getAttribute("data-remove-index"));
            targetSpecs = targetSpecs.filter((_, targetIndex) => targetIndex !== index);
            saveTargetSpecs();
            renderAgain();
          });
        });
        document.querySelectorAll("[data-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            scanViewFilter = button.getAttribute("data-filter") || "all";
            renderAgain();
          });
        });
        document.querySelectorAll("[data-rescan-button]").forEach((button) => {
          button.addEventListener("click", () => boot());
        });
        targetInput?.addEventListener("keydown", (event) => {
          if (event.key !== "Enter") return;
          addTarget();
        });
      }

      function renderLocalMePanel() {
        const isReady = localMeBoot.status === "initiated";
        const state = isReady ? "initiated" : localMeBoot.status === "error" ? "offline" : "loading";
        const seed = `${localMeBoot.seed}:${localMeBoot.expression}`;
        const detail = localMeBoot.status === "error"
          ? localMeBoot.error || ".me runtime unavailable"
          : "seed stays local";
        return `
          <div class="boot-panel">
            <div class="mesh-bubbles is-synthesis">
              <div class="mesh-bubble is-synthesis ${isReady ? "is-recommended" : ""}">
                <span class="mesh-recommended">${escapeHtml(state)}</span>
                <span class="mesh-orb">${renderPixelAvatar(seed)}</span>
                <span class="mesh-name">.me</span>
                <span class="mesh-state">${escapeHtml(state)}</span>
              </div>
            </div>
            <div class="mesh-summary">
              <span class="mesh-pill">me[@]("${escapeHtml(localMeBoot.expression)}")</span>
              <span class="mesh-pill">${escapeHtml(detail)}</span>
            </div>
            <div class="trust-line" aria-label=".me trust status">
              <span class="trust-item">local kernel</span>
              <span class="trust-item">deterministic root</span>
              <span class="trust-item">network optional</span>
            </div>
          </div>
        `;
      }

      function renderGuiResolutionPanel() {
        const isResolved = guiResolution.status === "resolved";
        const state = isResolved
          ? "ready"
          : guiResolution.status === "offline"
            ? "offline"
            : guiResolution.status === "resolving"
              ? "resolving"
              : "standby";
        const detail = guiResolution.status === "offline"
          ? guiResolution.error || "GUI not resolved"
          : guiResolution.detail || "local first";
        return `
          <div class="boot-panel">
            <div class="boot-panel-head">
              <div>
                <strong>GUI</strong>
                <span>local first</span>
              </div>
              <span class="mesh-state">${escapeHtml(state)}</span>
            </div>
            <div class="mesh-summary">
              <span class="mesh-pill">${escapeHtml(guiResolution.label || "GUI")}</span>
              <span class="mesh-pill">${escapeHtml(detail)}</span>
            </div>
          </div>
        `;
      }

      function renderResolvingGui(monads = []) {
        const hasMonads = monads.length > 0;
        renderShell({
          title: hasMonads ? "monads.mesh" : ".me",
          caption: hasMonads ? meshPathLabel(namespaceLabel(monads)) : "monads offline",
          phase: "GUI Resolution",
          phaseCaption: "Resolving the GUI locally first, then through Monad routes.",
          progress: 72,
          state: "normal",
          showLog: false,
          body: `
            ${renderLocalMePanel()}
            ${renderGuiResolutionPanel()}
            ${hasMonads ? `
              <div class="boot-panel">
                <div class="boot-panel-head">
                  <div>
                    <strong>Monads</strong>
                    <span>Synthesis by reduction.</span>
                  </div>
                </div>
                ${renderMeshBubbles(monads, recommendedMonad(monads))}
              </div>
            ` : ""}
          `,
        });
      }

      function renderNoMonad(monads = []) {
        setBootStep("idle", `${lastScanAttempts.length} checked`);
        renderShell({
          title: ".me",
          caption: "monads offline",
          progress: 100,
          state: "stalled",
          showPhase: false,
          showLog: false,
          body: `
            ${renderLocalMePanel()}
            ${renderGuiResolutionPanel()}
            ${renderSelectorComposer()}
            <div class="boot-actions">
              <a class="boot-button" href="modules/monad/npm/README.md">Installation guide</a>
            </div>
            ${renderScanPanel()}
          `,
        });
        bindDiscoveryControls(() => renderNoMonad(monads));
      }

      function renderMeshBubbles(monads, recommended) {
        return `
          <div class="mesh-bubbles">
            ${monads.map((monad, index) => {
              const target = `${monad.endpoint.replace(/\/+$/, "")}/`;
              const isRecommended = recommended?.endpoint === monad.endpoint;
              const name = displayMeshMonadName(monad, index);
              return `
                <a class="mesh-bubble ${isRecommended ? "is-recommended" : ""}" href="${escapeHtml(target)}">
                  ${isRecommended ? `<span class="mesh-recommended">best</span>` : ""}
                  <span class="mesh-orb">${renderPixelAvatar(monad.id || monad.name || monad.endpoint)}</span>
                  <span class="mesh-name">${escapeHtml(name)}</span>
                  <span class="mesh-state">${escapeHtml(displayMonadState(monad))}</span>
                </a>
              `;
            }).join("")}
          </div>
        `;
      }

      function renderSynthesizedMonad(monads, recommended) {
        const target = recommended ? `${recommended.endpoint.replace(/\/+$/, "")}/` : "#";
        const status = monads.some((monad) => String(monad.status || "").toLowerCase() === "online")
          ? "online"
          : "stale";
        const seed = `${namespaceLabel(monads)}:${monads.map(monadRouteKey).join("|")}`;
        return `
          <div class="mesh-bubbles is-synthesis">
            <a class="mesh-bubble is-synthesis is-recommended" href="${escapeHtml(target)}">
              <span class="mesh-recommended">reduced</span>
              <span class="mesh-orb">${renderPixelAvatar(seed)}</span>
              <span class="mesh-name">.me</span>
              <span class="mesh-state">${escapeHtml(status)}</span>
            </a>
          </div>
        `;
      }

      function renderMesh(monads, selected = null) {
        const recommended = selected || recommendedMonad(monads);
        const namespace = namespaceLabel(monads);
        setBootStep("mesh", `${monads.length} active routes`);
        renderShell({
          title: "monads.mesh",
          caption: meshPathLabel(namespace),
          progress: 100,
          state: "normal",
          showPhase: false,
          showLog: false,
          body: `
            ${renderLocalMePanel()}
            ${renderGuiResolutionPanel()}
            <details class="boot-details" open>
              <summary>Monads</summary>
              <div class="boot-panel">
                <div class="boot-panel-head">
                  <div>
                    <strong>Monads</strong>
                    <span>Synthesis by reduction.</span>
                  </div>
                  <div class="boot-actions">
                    <button class="boot-button primary" type="button" data-rescan-button>Rescan</button>
                  </div>
                </div>
                ${renderMeshBubbles(monads, recommended)}
              </div>
            </details>
            <details class="boot-details">
              <summary>discovery</summary>
              ${renderSelectorComposer()}
              ${renderScanPanel()}
            </details>
          `,
        });
        bindDiscoveryControls(() => renderMesh(monads, selected));
      }

      async function boot() {
        try {
          unmountGuiNamespaceLayout();
          setBootStep("init");
          bootLog = [];
          pushLog(`[build] ${BUILD}`);
          await initLocalMe();
          const monads = await discoverMonads();
          setBootStep("resolve gui", "local first");
          setGuiResolution({
            status: "resolving",
            label: "local GUI",
            source: "local",
            detail: "local first",
            error: "",
          });
          renderResolvingGui(monads);
          let guiReady = false;
          try {
            await ensureGuiRuntime(monads);
            guiReady = true;
            pushLog(`[gui] ${guiResolution.label} ready`);
          } catch (error) {
            pushLog(`[gui] ${error?.message || "GUI unavailable"}`);
          }

          const params = new URLSearchParams(window.location.search);
          const requestedName = params.get("monad");
          const requestedDisplayName = displayMonadName(requestedName).toLowerCase();
          const selected =
            (requestedName &&
              monads.find(
                (monad) =>
                  monad.name === requestedName ||
                  displayMonadName(monad.name).toLowerCase() === requestedDisplayName ||
                  monad.endpoint.includes(requestedName),
              )) ||
            null;

          if (guiReady && mountGuiNamespaceLayout(monads, selected)) return;

          if (!monads.length) {
            pushLog("[scan] no live Monad found");
            renderNoMonad(monads);
            return;
          }

          renderMesh(monads, selected);
        } catch (error) {
          setBootStep("error", error?.message || String(error));
          pushLog(`[error] ${error?.stack || error?.message || String(error)}`);
          renderShell({
            title: "Entry boot fault",
            caption: "Discovery failed before a Monad could serve the GUI.",
            phase: "Entry Error",
            phaseCaption: "Check that local networking and the Monad daemon are available.",
            progress: 100,
            state: "error",
          });
          console.error("[all.this]", error);
        }
      }

      boot();
    </script>
  </body>
</html>
