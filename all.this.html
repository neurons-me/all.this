<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>all.this</title>
    <script>
      window.__THIS_GUI_DISABLE_AUTOBOOT__ = true;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const root = document.getElementById("root");
      const bootCandidates = [
        "./src/npm/dist/src/boot/browser-entry.js",
        "/src/npm/dist/src/boot/browser-entry.js",
        "/all.this/dist/src/boot/browser-entry.js",
        "https://cdn.jsdelivr.net/npm/all.this@1.0.45/dist/src/boot/browser-entry.js",
      ];

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderEmergencyBoot(title, detail) {
        root.innerHTML = `
          <style>
            :root { color-scheme: dark; }
            body {
              margin: 0;
              background: rgb(5, 5, 5);
              color: #e8eaed;
              font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, "Segoe UI", sans-serif;
            }
            .seed {
              min-height: 100vh;
              display: grid;
              align-items: center;
              padding: 24px;
              box-sizing: border-box;
            }
            .seed-panel {
              width: min(100%, 520px);
              border: 1px solid rgba(220, 224, 228, 0.12);
              background: rgba(12, 13, 15, 0.72);
              border-radius: 14px;
              padding: 18px;
              box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
            }
            .seed-kicker {
              font: 11px/1.4 "SFMono-Regular", Menlo, Consolas, monospace;
              letter-spacing: 0.16em;
              text-transform: uppercase;
              color: #8d949b;
              margin-bottom: 10px;
            }
            .seed-title {
              font: 14px/1.55 "SFMono-Regular", Menlo, Consolas, monospace;
              color: #f0f2f3;
            }
            .seed-detail {
              margin-top: 8px;
              color: #9da4aa;
              font-size: 13px;
              line-height: 1.6;
            }
          </style>
          <section class="seed">
            <div class="seed-panel">
              <div class="seed-kicker">all.this seed</div>
              <div class="seed-title">${escapeHtml(title)}</div>
              <div class="seed-detail">${escapeHtml(detail)}</div>
            </div>
          </section>
        `;
      }

      async function importFirst(candidates) {
        let lastError = null;
        for (const candidate of candidates) {
          try {
            return await import(candidate);
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error("all.this boot unavailable");
      }

      try {
        renderEmergencyBoot("all.this", "Loading local-first package boot.");
        const boot = await importFirst(bootCandidates);
        const startAllThis = boot.startAllThis || boot.default;
        if (typeof startAllThis !== "function") {
          throw new Error("startAllThis export missing");
        }
        await startAllThis({ root });
      } catch (error) {
        renderEmergencyBoot(
          "all.this boot fault",
          error?.stack || error?.message || String(error),
        );
        console.error("[all.this]", error);
      }
    </script>
  </body>
</html>
