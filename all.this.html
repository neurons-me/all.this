<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>all.this</title>
    <script>
      window.__THIS_GUI_DISABLE_AUTOBOOT__ = true;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const root = document.getElementById("root");
      const params = new URLSearchParams(window.location.search);
      const allowCdnBoot = params.get("cdn") === "1" || params.get("allowCdn") === "1";
      const bootCandidates = [
        "./src/npm/dist/src/boot/browser-entry.js",
        "src/npm/dist/src/boot/browser-entry.js",
        "/src/npm/dist/src/boot/browser-entry.js",
        "/all.this/src/npm/dist/src/boot/browser-entry.js",
      ];
      const globalBootCandidates = [
        "./src/npm/dist/src/boot/browser-global.js",
        "src/npm/dist/src/boot/browser-global.js",
        "/src/npm/dist/src/boot/browser-global.js",
        "/all.this/src/npm/dist/src/boot/browser-global.js",
      ];

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderEmergencyBoot(title, detail) {
        root.innerHTML = `
          <style>
            :root { color-scheme: dark; }
            body {
              margin: 0;
              background: rgb(5, 5, 5);
              color: #e8eaed;
              font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, "Segoe UI", sans-serif;
            }
            .seed {
              min-height: 100vh;
              display: grid;
              align-items: center;
              padding: 24px;
              box-sizing: border-box;
            }
            .seed-panel {
              width: min(100%, 520px);
              border: 1px solid rgba(220, 224, 228, 0.12);
              background: rgba(12, 13, 15, 0.72);
              border-radius: 14px;
              padding: 18px;
              box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
            }
            .seed-kicker {
              font: 11px/1.4 "SFMono-Regular", Menlo, Consolas, monospace;
              letter-spacing: 0.16em;
              text-transform: uppercase;
              color: #8d949b;
              margin-bottom: 10px;
            }
            .seed-title {
              font: 14px/1.55 "SFMono-Regular", Menlo, Consolas, monospace;
              color: #f0f2f3;
            }
            .seed-detail {
              margin-top: 8px;
              color: #9da4aa;
              font-size: 13px;
              line-height: 1.6;
            }
          </style>
          <section class="seed">
            <div class="seed-panel">
              <div class="seed-kicker">all.this seed</div>
              <div class="seed-title">${escapeHtml(title)}</div>
              <div class="seed-detail">${escapeHtml(detail)}</div>
            </div>
          </section>
        `;
      }

      async function importFirst(candidates) {
        const failures = [];
        for (const candidate of candidates) {
          try {
            return await import(candidate);
          } catch (error) {
            failures.push({
              candidate,
              message: error?.message || String(error),
            });
          }
        }
        const detail = failures
          .map((failure) => `${failure.candidate} :: ${failure.message}`)
          .join("\n");
        throw new Error(`all.this boot unavailable\n${detail}`);
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const absoluteSrc = new URL(src, document.baseURI).href;
          const existing = Array.from(document.querySelectorAll("script[src]")).find(
            (node) => node.src === absoluteSrc,
          );
          if (existing) {
            resolve(true);
            return;
          }

          const script = document.createElement("script");
          script.src = src;
          script.async = false;
          if (/^https?:/i.test(src)) script.crossOrigin = "anonymous";
          script.onload = () => resolve(true);
          script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
          document.head.appendChild(script);
        });
      }

      async function loadScriptFirst(candidates) {
        const failures = [];
        for (const candidate of candidates) {
          try {
            await loadScript(candidate);
            return candidate;
          } catch (error) {
            failures.push({
              candidate,
              message: error?.message || String(error),
            });
          }
        }
        const detail = failures
          .map((failure) => `${failure.candidate} :: ${failure.message}`)
          .join("\n");
        throw new Error(`all.this static boot unavailable\n${detail}`);
      }

      async function startGlobalBoot(options) {
        renderEmergencyBoot("all.this", "Loading static local package boot.");
        await loadScriptFirst(globalBootCandidates);
        const startAllThis = window.AllThisBoot?.startAllThis || window.AllThisBoot?.default;
        if (typeof startAllThis !== "function") {
          throw new Error("AllThisBoot.startAllThis missing");
        }
        return startAllThis(options);
      }

      try {
        const bootOptions = { root, allowCdn: allowCdnBoot };
        renderEmergencyBoot("all.this", "Loading local-first package boot.");
        if (window.location.protocol === "file:") {
          await startGlobalBoot(bootOptions);
        } else {
          try {
            const boot = await importFirst(bootCandidates);
            const startAllThis = boot.startAllThis || boot.default;
            if (typeof startAllThis !== "function") {
              throw new Error("startAllThis export missing");
            }
            await startAllThis(bootOptions);
          } catch (error) {
            console.warn("[all.this] ESM boot unavailable, trying static boot", error);
            await startGlobalBoot(bootOptions);
          }
        }
      } catch (error) {
        renderEmergencyBoot(
          "all.this boot fault",
          error?.stack || error?.message || String(error),
        );
        console.error("[all.this]", error);
      }
    </script>
  </body>
</html>
