<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>all.this · loading</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0f14;
        color: #e8eef8;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: 100%;
        max-width: 760px;
        display: grid;
        gap: 16px;
      }

      .brand-image {
        width: 100%;
        max-width: 220px;
        height: auto;
        display: block;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.64;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.05;
      }

      p {
        margin: 0;
        opacity: 0.8;
        max-width: 64ch;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .item {
        display: grid;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
      }
      .item {
        grid-template-columns: 96px 120px 1fr;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .select {
        width: 100%;
        min-width: 0;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        padding: 8px 10px;
        font: inherit;
      }

      .select:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.28);
      }

      .name {
        font-weight: 600;
      }

      .state {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .state.pending,
      .state.loading {
        color: #f59e0b;
      }

      .state.loaded {
        color: #22c55e;
      }

      .state.error {
        color: #ef4444;
      }

      .meta {
        font-size: 13px;
        opacity: 0.78;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <img
          class="brand-image"
          src="https://res.cloudinary.com/dkwnxf6gm/image/upload/v1765903003/all.this_sr55ml.webp"
          alt="all.this"
        />
        <div class="eyebrow">all.this</div>
        <h1>Loading runtime modules</h1>
        <p>
          This page only loads the runtime modules. No layout, bars, routing, or app content is initialized here.
        </p>
        <div id="status" class="list"></div>
      </div>
    </main>

    <script>
      const LOCAL_GUI_UMD = './npm/dist/this.gui.umd.js';
      const LOCAL_CLEAKER_UMD = '../../core/cleaker/npm/dist/cleaker.umd.js';
      const LOCAL_ME_UMD = '../../this/.me/npm/dist/me.umd.js';
      const LOCAL_DOM_UMD = './npm/dist/dom.umd.js';

      const CDN_GUI_UMD = 'https://cdn.jsdelivr.net/npm/this.gui@latest/dist/this.gui.umd.js';
      const CDN_CLEAKER_UMD = 'https://cdn.jsdelivr.net/npm/cleaker@latest/dist/cleaker.umd.js';
      const CDN_ME_UMD = 'https://cdn.jsdelivr.net/npm/this.me@latest/dist/me.umd.js';
      const CDN_DOM_UMD = 'https://cdn.jsdelivr.net/npm/this.dom@latest/dist/dom.umd.js';

      const MODULES = [
        {
          key: 'gui',
          name: 'GUI',
          localUrl: LOCAL_GUI_UMD,
          cdnUrl: CDN_GUI_UMD,
          detect: () => window.GUI,
          version: () => {
            const mod = window.GUI;
            return (
              mod?.version ||
              mod?.VERSION ||
              mod?.__version ||
              mod?.__VERSION__ ||
              mod?.default?.version ||
              mod?.default?.VERSION ||
              ''
            );
          },
        },
        {
          key: 'cleaker',
          name: 'Cleaker',
          localUrl: LOCAL_CLEAKER_UMD,
          cdnUrl: CDN_CLEAKER_UMD,
          detect: () => window.Cleaker || window.cleaker,
          version: () => {
            const mod = window.Cleaker || window.cleaker;
            return (
              mod?.version ||
              mod?.VERSION ||
              mod?.__version ||
              mod?.__VERSION__ ||
              mod?.default?.version ||
              mod?.default?.VERSION ||
              ''
            );
          },
        },
        {
          key: 'me',
          name: '.me',
          localUrl: LOCAL_ME_UMD,
          cdnUrl: CDN_ME_UMD,
          detect: () => window.Me,
          version: () => {
            const mod = window.Me;
            return mod?.version || mod?.VERSION || mod?.__version || mod?.__VERSION__ || '';
          },
        },
        {
          key: 'dom',
          name: 'DOM',
          localUrl: LOCAL_DOM_UMD,
          cdnUrl: CDN_DOM_UMD,
          detect: () => window.DOM || window.dom,
          version: () => {
            const mod = window.DOM || window.dom;
            return (
              mod?.version ||
              mod?.VERSION ||
              mod?.__version ||
              mod?.__VERSION__ ||
              mod?.default?.version ||
              mod?.default?.VERSION ||
              ''
            );
          },
        },
      ];

      const statusEl = document.getElementById('status');
      const moduleState = Object.create(null);
      const moduleSource = Object.fromEntries(MODULES.map((mod) => [mod.key, 'cdn']));

      function renderStatus() {
        statusEl.innerHTML = MODULES.map((mod) => {
          const source = moduleSource[mod.key] || 'cdn';
          const selectedUrl = source === 'local' ? mod.localUrl : mod.cdnUrl;
          const state = moduleState[mod.key] || {
            state: 'pending',
            detail: selectedUrl,
          };
          return `
            <div class="item">
              <div class="name">${mod.name}</div>
              <div class="controls">
                <select class="select" data-module="${mod.key}">
                  <option value="cdn" ${source === 'cdn' ? 'selected' : ''}>CDN</option>
                  <option value="local" ${source === 'local' ? 'selected' : ''}>Local</option>
                </select>
              </div>
              <div>
                <div class="state ${state.state}">${state.state}</div>
                <div class="meta">${state.detail || ''}</div>
              </div>
            </div>
          `;
        }).join('');
      }

      function setModuleState(key, state, detail) {
        moduleState[key] = { state, detail };
        renderStatus();
        statusEl.querySelectorAll('select[data-module]').forEach((select) => {
          select.onchange = (event) => {
            const key = event.target.getAttribute('data-module');
            const value = event.target.value === 'local' ? 'local' : 'cdn';
            moduleSource[key] = value;
            const moduleDef = MODULES.find((entry) => entry.key === key);
            if (moduleDef) {
              const url = value === 'local' ? moduleDef.localUrl : moduleDef.cdnUrl;
              moduleState[key] = {
                state: 'pending',
                detail: url,
              };
              renderStatus();
            }
          };
        });
      }

      function absoluteUrl(url) {
        try {
          return new URL(url, window.location.href).toString();
        } catch (_) {
          return url;
        }
      }

      function loadScript(url) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = url;
          script.async = true;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error('Failed to load ' + url));
          document.head.appendChild(script);
        });
      }

      async function boot() {
        renderStatus();

        for (const mod of MODULES) {
          const source = moduleSource[mod.key] || 'cdn';
          const rawUrl = source === 'local' ? mod.localUrl : mod.cdnUrl;
          const targetUrl = absoluteUrl(rawUrl);
          setModuleState(mod.key, 'loading', targetUrl);

          try {
            await loadScript(rawUrl);
            const detected = mod.detect();
            if (!detected) {
              throw new Error(mod.name + ' loaded but no global export was found');
            }
            const version = mod.version();
            setModuleState(
              mod.key,
              'loaded',
              version ? `${targetUrl} · v${version}` : targetUrl
            );
          } catch (error) {
            const message = error && error.message ? error.message : String(error);
            setModuleState(mod.key, 'error', message);
          }
        }
      }

      boot();
    </script>
  </body>
</html>
